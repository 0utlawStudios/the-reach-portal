name: CI

# Force v4 checkout/setup-node actions to run on Node.js 24 now, ahead of
# GitHub's June 2, 2026 deprecation of Node.js 20 on actions. Removes the
# deprecation warning and keeps the workflow forward-compatible.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_production_media_smoke:
        description: "Run the production media upload/render smoke test. This creates and cleans up QA data."
        required: true
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Audit, Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      VERCEL_PROJECT_NAME: the-reach-portal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm run audit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify deploy target
        run: npm run verify:target

      - name: DB type drift check
        if: ${{ env.SUPABASE_PROJECT_ID != '' && env.SUPABASE_ACCESS_TOKEN != '' }}
        run: npm run db:types:check

      - name: Build
        run: npm run build

  production-media-smoke:
    name: Production Media Smoke
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_production_media_smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run live media upload/render smoke
        env:
          PLAYWRIGHT_BASE_URL: https://thereach.ten80ten.com
          QA_ALLOW_PROD_UPLOADS: "1"
          PLAYWRIGHT_RUN_ID: ci-media-${{ github.run_id }}-${{ github.run_attempt }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}
          MEDIA_PLAYBACK_SIGNING_SECRET: ${{ secrets.MEDIA_PLAYBACK_SIGNING_SECRET }}
        run: npm run e2e:media

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-media-smoke-report
          path: |
            playwright-report
            perf/drag-evidence/playwright-results
          if-no-files-found: ignore
