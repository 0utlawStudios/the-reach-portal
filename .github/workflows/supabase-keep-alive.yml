# SUPERSEDED: scheduled keep-alive moved to the budget-free public repo
# 0utlawStudios/keep-alive (public repo = unlimited Actions, off the 2,000-min
# private quota). This workflow is manual-only now (workflow_dispatch) as an
# emergency fallback. Do NOT re-add `schedule:` — it would burn private minutes.
name: Supabase Keep Alive

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production keep-alive endpoint
        env:
          HEALTH_CHECK_SECRET: ${{ secrets.HEALTH_CHECK_SECRET }}
        run: |
          test -n "$HEALTH_CHECK_SECRET"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $HEALTH_CHECK_SECRET" \
            https://thereach.ten80ten.com/api/health/keep-alive
