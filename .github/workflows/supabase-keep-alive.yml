name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 9 */2 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production keep-alive endpoint
        env:
          HEALTH_CHECK_SECRET: ${{ secrets.HEALTH_CHECK_SECRET }}
        run: |
          test -n "$HEALTH_CHECK_SECRET"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $HEALTH_CHECK_SECRET" \
            https://thereach.ten80ten.com/api/health/keep-alive
